<!doctype html>

<html>
  <head>
    <title>Accordion</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="../style.css" />
  </head>

  <body>
    <nav>
      <a href="../index.html">Home</a>
    </nav>
    <div class="container" bis_skin_checked="1">
      <div
        style="display: flex; justify-content: center; align-items: center"
        bis_skin_checked="1"
      >
        <button class="arrowbtn" id="left">←</button>
        <div
          style="width: 50%; display: flex; overflow: hidden"
          bis_skin_checked="1"
        >
          <div
            id="container"
            style="display: flex; width: 100%; transition: transform 0.4s"
            bis_skin_checked="1"
          >
            <div class="content" bis_skin_checked="1">
              <h3>Mountains</h3>
              <p>Beautiful mountain landscape</p>
              <img
                class="img"
                src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=1200"
                width="240"
              />
            </div>
            <div class="content" bis_skin_checked="1">
              <h3>Beach</h3>
              <p>Sunny beach with clear water</p>
              <img
                class="img"
                src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1200"
                width="240"
              />
            </div>
            <div class="content" bis_skin_checked="1">
              <h3>Forest</h3>
              <p>Green forest pathway</p>
              <img
                class="img"
                src="https://images.unsplash.com/photo-1448375240586-882707db888b?w=1200"
                width="240"
              />
            </div>
            <div class="content" bis_skin_checked="1">
              <h3>City</h3>
              <p>Night city skyline</p>
              <img
                class="img"
                src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=1200"
                width="240"
              />
            </div>
            <div class="content" bis_skin_checked="1">
              <h3>Desert</h3>
              <p>Golden sand dunes</p>
              <img
                class="img"
                src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=1200"
                width="240"
              />
            </div>
          </div>
        </div>
        <button class="arrowbtn" id="right">→</button>
      </div>
      <div class="dotsContainer" bis_skin_checked="1">
        <div data-id="1" class="dots active" bis_skin_checked="1"></div>
        <div data-id="2" class="dots" bis_skin_checked="1"></div>
        <div data-id="3" class="dots" bis_skin_checked="1"></div>
        <div data-id="4" class="dots" bis_skin_checked="1"></div>
        <div data-id="5" class="dots" bis_skin_checked="1"></div>
      </div>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="./index.js"></script>
  </body>
</html>
